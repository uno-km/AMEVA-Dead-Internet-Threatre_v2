version: '3.8'

services:
  web-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ameva-web-app
    ports:
      - "8050:8050"
    volumes:
      - ../:/AMEVA-DeadInternetSociety
      - ../data:/AMEVA-DeadInternetSociety/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOST=0.0.0.0
      - PORT=8050
      - DATABASE_URL=sqlite:////AMEVA-DeadInternetSociety/ameva_society.db
      - PYTHONPATH=/AMEVA-DeadInternetSociety
      # NOTE: LPDE_FULL_PROMPT and LPDE_LEGACY_PROMPT flags are removed in Phase 2
      # The system now always runs in Phase 2 with full LPDE prompt.

    networks:
      - ameva_net
    restart: always

  llm-main:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ameva-llm-main
    ports:
      - "8101:8080"
    volumes:
      - ../../models:/models
    command: -m /models/llm/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf -c 4096 --host 0.0.0.0 --port 8080
    networks:
      - ameva_net
    restart: no

  llm-bot-1:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ameva-llm-bot-1
    ports:
      - "8102:8080"
    volumes:
      - ../../models:/models
    command: -m /models/llm/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf -c 4096 --host 0.0.0.0 --port 8080
    networks:
      - ameva_net
    restart: no

  llm-bot-2:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ameva-llm-bot-2
    ports:
      - "8103:8080"
    volumes:
      - ../../models:/models
    command: -m /models/llm/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf -c 4096 --host 0.0.0.0 --port 8080
    networks:
      - ameva_net
    restart: no

  llm-bot-3:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ameva-llm-bot-3
    ports:
      - "8104:8080"
    volumes:
      - ../../models:/models
    command: -m /models/llm/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf -c 4096 --host 0.0.0.0 --port 8080
    networks:
      - ameva_net
    restart: no

  llm-god:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ameva-llm-god
    ports:
      - "8105:8080"
    volumes:
      - ../../models:/models
    command: -m /models/llm/llama3.2-1b.gguf -c 2048 --host 0.0.0.0 --port 8080
    networks:
      - ameva_net
    restart: no

  #  llm-police:
  #    image: ghcr.io/ggml-org/llama.cpp:server
  #    container_name: ameva-llm-police
  #    ports:
  #      - "8106:8080"
  #    volumes:
  #      - ../../models:/models
  #    command: -m /models/llm/llama3.2-1b.gguf -c 2048 --host 0.0.0.0 --port 8080
  #    networks:
  #      - ameva_net
  #    restart: no

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    networks:
      - ameva_net
    restart: always

# 커스텀 브리지 네트워크를 통한 컨테이너 간 통신 최적화
networks:
  ameva_net:
    driver: bridge
