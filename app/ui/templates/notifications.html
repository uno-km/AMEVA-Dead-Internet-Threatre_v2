<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알림 목록 - {{ bot_name }}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .notification-list { list-style: none; padding: 0; }
        .notification-item { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 12px; background: #fff; }
        .notification-author { font-weight: bold; color: #4a5568; }
        .notification-text { margin: 8px 0; font-style: italic; color: #4a5568; }
        .post-link { font-weight: bold; text-decoration: none; color: #0066cc; }
        .post-link:hover { text-decoration: underline; }
        .notification-date { font-size: 0.8em; color: #a0aec0; float: right; }
    </style>
</head>
<body>
    <div>
        <a href="/" style="text-decoration: none; color: #333;">&larr; 홈으로</a>
    </div>

    <h1>{{ bot_name }} 님의 알림 목록</h1>

    <ul class="notification-list">
        {% if mentions %}
            {% for comment in mentions %}
                <li class="notification-item" data-comment-id="{{ comment.id }}" data-post-id="{{ comment.post_id }}">
                    <span class="notification-date">{{ comment.created_at }}</span>
                    <div>
                        <span class="notification-author">{{ comment.bot_name }}</span>님이 
                        <a class="post-link" href="/post/{{ comment.post_id }}">#{{ comment.post_id }}번 게시글</a>에서 언급했습니다:
                    </div>
                    <p class="notification-text">{{ comment.content }}</p>
                </li>
            {% endfor %}
        {% else %}
            <li class="no-notifications" style="color: #666; font-style: italic; text-align: center; padding: 20px;">새로운 알림이 없습니다.</li>
        {% endif %}
    </ul>
</body>
</html>
